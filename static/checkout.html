<!DOCTYPE html>
<html>
<head>
    <title>Book Event Tickets</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; color: #333;}
        .checkout-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: 0 auto; border-top: 5px solid #1F4F82;}
        h2 { color: #1F4F82; text-align: center; margin-top: 0; }
        
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; font-size: 0.9em; color: #555; display: block; margin-bottom: 5px;}
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1em;}
        
        .price-summary { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 1.2em;}
        .total-highlight { color: #28a745; font-weight: bold; font-size: 1.4em; }
        
        button { width: 100%; padding: 15px; background: #1F4F82; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer;}
        button:disabled { background: #ccc; }
        
        /* Payment Screen */
        #payment-step { display: none; text-align: center; }
        #qr-image { width: 80%; max-width: 250px; border: 4px solid #1F4F82; border-radius: 12px; margin: 15px 0; }
        .wa-btn { background: #25D366; display: block; text-decoration: none; padding: 15px; border-radius: 8px; color: white; font-weight: bold; font-size: 1.1em; margin-top: 15px; width: 100%; box-sizing: border-box;}
    </style>
</head>
<body>

    <div class="checkout-box">
        
        <div id="form-step">
            <h2>🎟️ Book Your Ticket</h2>
            <form id="customerForm">
                <div class="form-group">
                    <label>Select Event</label>
                    <select name="event_id" id="eventDropdown" required onchange="calculateTotal()">
                        <option value="" disabled selected>Loading Events...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" id="nameInput" placeholder="" required minlength="2">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="" required>
                </div>
                <div class="form-group">
                    <label>WhatsApp Number</label>
                    <input type="tel" name="phone" placeholder="" required minlength="10">
                </div>
                <div class="form-group">
                    <label>Number of Tickets</label>
                    <input type="number" name="tickets" id="ticketCount" value="1" min="1" max="10" required onchange="calculateTotal()" onkeyup="calculateTotal()">
                </div>

                <div class="price-summary">
                    Total Amount Due: <br>
                    <span class="total-highlight">₹<span id="displayTotal">0</span></span>
                    <input type="hidden" name="total_amount" id="hiddenTotal">
                </div>
                <button type="submit" id="submitBtn">Proceed to Payment</button>
            </form>
        </div>

        <div id="payment-step">
            <h2>💳 Complete Payment</h2>
            <p>Please scan the QR code below using any UPI app to pay <strong style="font-size: 1.2em; color:#28a745;">₹<span id="finalPayAmount"></span></strong></p>
            
            <img src="/static_qr.jpg" id="qr-image" alt="UPI QR Code">
            
            <p style="font-size: 0.9em; color: #666;">Once paid, click the button below to share your screenshot with our team to get your PDF ticket!</p>
            
            <a href="#" id="wa-share-btn" class="wa-btn">💬 I Have Paid -> Send Screenshot</a>
        </div>
    </div>

    <script>
        // ⚠️ CHANGE THIS TO YOUR ACTUAL WHATSAPP BUSINESS NUMBER (Include Country Code 91)
        const BUSINESS_WA_NUMBER = "919876543210"; 
        
        let eventsData = [];

        fetch('/api/public/events')
            .then(res => res.json())
            .then(events => {
                eventsData = events;
                const dropdown = document.getElementById('eventDropdown');
                dropdown.innerHTML = '<option value="" disabled selected>Select an Event...</option>';
                events.forEach(e => {
                    dropdown.innerHTML += `<option value="${e.id}">${e.name} (₹${e.price}/ticket)</option>`;
                });
            });

        function calculateTotal() {
            const eventId = document.getElementById('eventDropdown').value;
            const ticketCount = parseInt(document.getElementById('ticketCount').value) || 0;
            
            if (eventId && ticketCount > 0) {
                const selectedEvent = eventsData.find(e => e.id === eventId);
                const total = selectedEvent.price * ticketCount;
                document.getElementById('displayTotal').innerText = total;
                document.getElementById('hiddenTotal').value = total;
                document.getElementById('finalPayAmount').innerText = total;
            }
        }

        document.getElementById('customerForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Securing Order..."; btn.disabled = true;

            const formData = new FormData(this);

            fetch('/api/public/submit-lead', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    document.getElementById('form-step').style.display = 'none';
                    document.getElementById('payment-step').style.display = 'block';
                    
                    const customerName = document.getElementById('nameInput').value;
                    const ticketQty = document.getElementById('ticketCount').value;
                    const eventName = document.getElementById('eventDropdown').options[document.getElementById('eventDropdown').selectedIndex].text.split(' (')[0]; // Gets name without price
                    
                    const waMessage = `Hi! I just paid for ${ticketQty} tickets for ${eventName}. My name is ${customerName}. Here is my payment screenshot! (Order Ref: ${data.order_id})`;
                    
                    document.getElementById('wa-share-btn').href = `https://wa.me/${+918169630273}?text=${encodeURIComponent(waMessage)}`;
                } else {
                    alert("Error saving details. Please try again.");
                    btn.innerText = "Proceed to Payment"; btn.disabled = false;
                }
            }).catch(() => {
                alert("Network Error!");
                btn.innerText = "Proceed to Payment"; btn.disabled = false;
            });
        };
    </script>
</body>
</html>
